<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOCform</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .header { padding: 11px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .header h1 { font-size: 15px; font-weight: 600; color: #f0f6fc; }
    .badge { font-size: 11px; background: #1f6feb22; color: #58a6ff; padding: 2px 8px; border-radius: 12px; border: 1px solid #1f6feb44; }
    .badge-green { font-size: 11px; background: #23863622; color: #56d364; padding: 2px 8px; border-radius: 12px; border: 1px solid #23863644; }
    .main { display: grid; grid-template-columns: 1fr 1fr; flex: 1; overflow: hidden; }
    .input-panel { display: flex; flex-direction: column; border-right: 1px solid #30363d; position: relative; }
    .panel-bar { padding: 7px 12px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
    .panel-bar-left { display: flex; align-items: center; gap: 10px; }
    .panel-bar span { font-size: 11px; color: #8b949e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
    .source-badge { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 500; display: none; }
    .source-badge.text { background: #21262d; color: #8b949e; display: inline; }
    .source-badge.docx { background: #1a4280; color: #79c0ff; display: inline; border: 1px solid #1f6feb44; }
    .btn-row { display: flex; gap: 6px; }
    .btn { padding: 5px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500; transition: background 0.15s; }
    .btn-primary { background: #238636; color: #fff; } .btn-primary:hover { background: #2ea043; }
    .btn-ghost { background: transparent; color: #8b949e; border: 1px solid #30363d; } .btn-ghost:hover { color: #f0f6fc; border-color: #8b949e; }
    .drop-zone { flex: 1; display: flex; flex-direction: column; position: relative; }
    .drop-overlay { display: none; position: absolute; inset: 0; z-index: 10; background: #0d1117ee; border: 2px dashed #1f6feb; justify-content: center; align-items: center; flex-direction: column; gap: 12px; color: #58a6ff; font-size: 16px; }
    .drop-overlay .drop-icon { font-size: 40px; }
    .drop-zone.dragging .drop-overlay { display: flex; }
    .docx-banner { display: none; padding: 8px 14px; background: #1a4280; border-bottom: 1px solid #1f6feb44; font-size: 12px; color: #79c0ff; align-items: center; justify-content: space-between; gap: 8px; flex-shrink: 0; }
    .docx-banner.visible { display: flex; }
    .docx-banner button { background: transparent; border: 1px solid #1f6feb66; color: #79c0ff; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    textarea { flex: 1; width: 100%; border: none; outline: none; background: #0d1117; color: #c9d1d9; font-family: 'Consolas', monospace; font-size: 13px; line-height: 1.7; padding: 14px 16px; resize: none; }
    textarea::placeholder { color: #3d444d; }
    .drop-hint { padding: 0; flex-shrink: 0; max-height: 72px; }
    .drop-hint-inner { padding: 10px 14px; border-top: 1px dashed #30363d; display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .drop-hint-inner:hover { background: #161b22; }
    .drop-hint-text { font-size: 12px; color: #8b949e; }
    .drop-hint-text b { color: #79c0ff; }
    input[type="file"] { display: none; }
    .hint-bar { padding: 6px 12px; background: #161b22; border-top: 1px solid #30363d; font-size: 11px; color: #8b949e; line-height: 1.8; flex-shrink: 0; }
    .hint-bar code { background: #21262d; padding: 1px 5px; border-radius: 3px; font-family: 'Consolas', monospace; color: #79c0ff; font-size: 10px; }
    .output-panel { display: flex; flex-direction: column; overflow: hidden; }
    .key-tabs { display: flex; overflow-x: auto; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; scrollbar-width: thin; min-height: 36px; align-items: center; }
    .key-tabs-placeholder { padding: 0 14px; font-size: 11px; color: #3d444d; font-style: italic; }
    .ktab { padding: 8px 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #8b949e; cursor: pointer; font-size: 11px; font-weight: 500; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .ktab.active { color: #f0f6fc; border-bottom-color: #e94560; }
    .ktab:hover:not(.active) { color: #c9d1d9; }
    .version-tabs { display: flex; background: #161b22; border-bottom: 1px solid #30363d; flex-shrink: 0; }
    .vtab { padding: 8px 14px; background: transparent; border: none; border-bottom: 2px solid transparent; color: #8b949e; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; white-space: nowrap; }
    .vtab.active { color: #f0f6fc; border-bottom-color: #58a6ff; }
    .vtab:hover:not(.active) { color: #c9d1d9; }
    .output-code { flex: 1; background: #0d1117; color: #c9d1d9; font-family: 'Consolas', monospace; font-size: 12px; line-height: 1.7; padding: 14px 16px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; }
    .output-code.empty { color: #3d444d; font-style: italic; font-size: 13px; }
    .copy-bar { padding: 6px 12px; background: #161b22; border-top: 1px solid #30363d; display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }
    .btn-copy { padding: 5px 14px; background: #21262d; color: #c9d1d9; border: 1px solid #30363d; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all 0.15s; }
    .btn-copy:hover { background: #30363d; }
    .btn-copy.ok { background: #12261e; color: #56d364; border-color: #238636; }
  </style>
</head>
<body>
<div class="header">
  <h1>LOCform</h1>
  <span class="badge">конвертер верстки</span>
  <span class="badge-green" id="docx-support">✓ .docx</span>
</div>
<div class="main">
  <div class="input-panel">
    <div class="panel-bar">
      <div class="panel-bar-left">
        <span>Входной текст</span>
        <span class="source-badge text" id="source-badge">текст</span>
      </div>
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="clearAll()">Очистить</button>
        <button class="btn btn-primary" onclick="convert()">Конвертировать →</button>
      </div>
    </div>
    <div class="docx-banner" id="docx-banner">
      <span id="docx-filename"></span>
      <button onclick="clearAll()">✕</button>
    </div>
    <div class="drop-zone" id="drop-zone">
      <div class="drop-overlay">
        <div class="drop-icon">📄</div>
        <div>Отпусти .docx файл</div>
      </div>
      <textarea id="input" placeholder="Вставьте текст из Word или перетащите .docx..."></textarea>
    </div>
    <div class="drop-hint">
      <div class="drop-hint-inner" onclick="document.getElementById('file-input').click()">
        <div style="font-size:20px">📎</div>
        <div class="drop-hint-text"><b>Перетащите .docx сюда</b> или нажмите</div>
      </div>
      <input type="file" id="file-input" accept=".docx" onchange="handleFileInput(event)">
    </div>
    <div class="hint-bar">
      <code>Междустрочный интервал</code> → &lt;br&gt;&lt;br&gt; &nbsp;·&nbsp;
      <code>кнопка зеленая:</code> / <code>кнопка белая:</code> → кнопка &nbsp;·&nbsp;
      <code>Ctrl+Enter</code>
    </div>
  </div>
  <div class="output-panel">
    <div class="key-tabs" id="key-tabs">
      <span class="key-tabs-placeholder">← конвертируйте текст</span>
    </div>
    <div class="version-tabs">
      <button class="vtab active" onclick="showVersion(0)">Web</button>
      <button class="vtab"        onclick="showVersion(1)">Mobile</button>
      <button class="vtab"        onclick="showVersion(2)">New</button>
      <button class="vtab"        onclick="showVersion(3)">Topic</button>
    </div>
    <div class="output-code empty" id="output">← Вставьте текст или загрузите .docx</div>
    <div class="copy-bar">
      <button class="btn-copy" id="copy-btn" onclick="copyOutput()">Копировать HTML</button>
    </div>
  </div>
</div>
<script>
  'use strict';
  let fromDocx = false, parsedSections = [], curKey = 0, curVer = 0;

  // ── Button templates ──────────────────────────────────────────────────────
  // зеленая
  const G = [
    (t,u)=>`<br><br>\n\n<div style="display:flex;flex-direction:column;gap:8px;"><a href="${u}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:140px;height:25px;padding:0 12px;background-color:#07974D;color:#FFFFFF;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:none;">${t}</a></div>`,
    (t,u)=>`<br><br>\n\n<div style="display:flex;flex-direction:column;"><a href="${u}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:361px;height:40px;padding:9px 24px;background-color:#07974D;color:#FFFFFF;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:none;transform:rotate(0deg);">${t}</a></div>`,
    (t,u)=>`<div style="display:flex;flex-direction:column;align-items:center;width:100%;"><a href="${u}" style="display:inline-flex;justify-content:center;align-items:center;width:100%;max-width:300px;height:40px;padding:0 24px;margin-top:12px;background-color:#01B462;color:#FFFFFF;text-decoration:none;font-weight:600;text-align:center;border-radius:8px;font-family:Inter,sans-serif;font-size:14px;box-sizing:border-box;border:none;">${t}</a></div>`
  ];
  // белая
  const W = [
    (t,u)=>`<br><br>\n\n<div style="display:flex;flex-direction:column;gap:8px;"><a href="${u}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:140px;height:25px;padding:0 12px;background-color:transparent;color:#07974D;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:1px solid #07974D;">${t}</a></div>`,
    (t,u)=>`<br><br>\n\n<div style="display:flex;flex-direction:column;"><a href="${u}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:361px;height:40px;padding:9px 24px;background-color:transparent;color:#07974D;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:1px solid #07974D;">${t}</a></div>`,
    (t,u)=>`<div style="display:flex;flex-direction:column;align-items:center;width:100%;"><a href="${u}" style="display:inline-flex;justify-content:center;align-items:center;width:100%;max-width:300px;height:40px;padding:0 24px;margin-top:12px;background-color:transparent;color:#01B462;text-decoration:none;font-weight:600;text-align:center;border-radius:8px;font-family:Inter,sans-serif;font-size:14px;box-sizing:border-box;border:2px solid #01B462;">${t}</a></div>`
  ];
  // зеленая + белая
  const D = [
    (gT,gU,wT,wU)=>`<br><br>\n\n<div style="display:inline-flex;gap:8px;"><a href="${gU}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:140px;height:25px;padding:0 12px;background-color:#07974D;color:#FFFFFF;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:none;">${gT}</a><a href="${wU}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:140px;height:25px;padding:0 12px;background-color:transparent;color:#07974D;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:1px solid #07974D;">${wT}</a></div>`,
    (gT,gU,wT,wU)=>`<br><br>\n\n<div style="display:flex;flex-direction:column;"><a href="${gU}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:361px;height:40px;padding:9px 24px;background-color:#07974D;color:#FFFFFF;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:none;transform:rotate(0deg);">${gT}</a><a href="${wU}" target="_blank" style="display:inline-flex;justify-content:center;align-items:center;width:361px;height:40px;padding:9px 24px;margin-top:6px;background-color:transparent;color:#07974D;text-decoration:none;font-weight:normal;text-align:center;border-radius:4px;font-family:Arial,sans-serif;font-size:12px;box-sizing:border-box;opacity:1;border:1px solid #07974D;transform:rotate(0deg);">${wT}</a></div>`,
    (gT,gU,wT,wU)=>`<div style="display:flex;flex-direction:column;align-items:center;width:100%;"><a href="${gU}" style="display:inline-flex;justify-content:center;align-items:center;width:100%;max-width:300px;height:40px;padding:0 24px;margin-top:12px;background-color:#01B462;color:#FFFFFF;text-decoration:none;font-weight:600;text-align:center;border-radius:8px;font-family:Inter,sans-serif;font-size:14px;box-sizing:border-box;border:none;">${gT}</a><a href="${wU}" style="display:inline-flex;justify-content:center;align-items:center;width:100%;max-width:300px;height:40px;padding:0 24px;margin-top:12px;background-color:transparent;color:#01B462;text-decoration:none;font-weight:600;text-align:center;border-radius:8px;font-family:Inter,sans-serif;font-size:14px;box-sizing:border-box;border:2px solid #01B462;">${wT}</a></div>`
  ];

  function getBtn(color, v) { return /бел|white/i.test(color) ? W[v] : G[v]; }
  function getDual(v) { return D[v]; }

  // ── Parsing helpers ───────────────────────────────────────────────────────
  function skipBr(lines, from) {
    let k = from;
    while (k < lines.length && !lines[k].trim().replace(/<br\s*\/?>/gi, '').trim()) k++;
    return k;
  }

  // Strip outer parens from URL: "(/path)" → "/path"
  function cleanUrl(s) {
    return s.replace(/^\(|\)\s*$/g, '').trim();
  }

  function parseOneBtn(lines, i) {
    const plain = lines[i].trim().replace(/<[^>]+>/g, '').trim();

    // Anchor: "Кнопка зеленая:" or "Кнопка белая:" (and english Button green/white)
    // Text may follow on the SAME line after the colon, or on the NEXT line
    const m = plain.match(/^(?:Кнопка|кнопка|Button)\s+(зелен[^\s:]*|бел[^\s:]*|green|white)\s*:\s*(.*)/i);
    if (!m) return null;

    const color = m[1];                // зеленая / белая / green / white
    const sameLineText = m[2].trim();  // text after colon (may be empty)

    if (sameLineText) {
      // Check if URL is embedded in sameLineText: "Text (/url)" or "Text https://url"
      const emb = sameLineText.match(/^(.+?)\s+(\([^)]+\)|https?:\/\/\S+|\/\S+)\s*$/);
      if (emb) return { color, text: emb[1].trim(), url: cleanUrl(emb[2]), nextI: i + 1 };
      // Otherwise URL is on the next line
      const j = skipBr(lines, i + 1);
      if (j >= lines.length) return null;
      const url = cleanUrl(lines[j].trim().replace(/<[^>]+>/g, '').trim());
      if (!url) return null;
      return { color, text: sameLineText, url, nextI: j + 1 };
    }

    // Text is on the next line
    const j = skipBr(lines, i + 1);
    if (j >= lines.length) return null;
    const np = lines[j].trim().replace(/<[^>]+>/g, '').trim();
    if (!np) return null;

    // "Text https://url" or "Text /relative" on same line
    const sm = np.match(/^(.+?)\s+(https?:\/\/\S+|\/\S+|\(\S+\))\s*$/);
    if (sm) return { color, text: sm[1].trim(), url: cleanUrl(sm[2]), nextI: j + 1 };

    // Text then URL on separate line
    const k = skipBr(lines, j + 1);
    const urlRaw = cleanUrl(lines[k]?.trim().replace(/<[^>]+>/g, '').trim() || '');
    if (urlRaw) return { color, text: np, url: urlRaw, nextI: k + 1 };

    return null;
  }

  // ── Apply rules ───────────────────────────────────────────────────────────
  function applyRules(t, v) {
    t = t.replace(/Междустрочный интервал/g, '\n<br><br>\n');
    const lines = t.split('\n'), out = [];
    let i = 0;
    while (i < lines.length) {
      const plain = lines[i].trim().replace(/<[^>]+>/g, '').trim();
      // Legacy: "Button green: Text (url)"
      const leg = plain.match(/^(?:кнопка|Button)\s+(\S+?):\s+(.+?)\s+\((https?:\/\/[^)]+)\)\s*$/i);
      if (leg) { out.push(getBtn(leg[1], v)(leg[2].trim(), leg[3].trim())); i++; continue; }
      const b1 = parseOneBtn(lines, i);
      if (b1) {
        const b2 = parseOneBtn(lines, skipBr(lines, b1.nextI));
        if (b2) {
          const fg = !/бел|white/i.test(b1.color);
          const [gT, gU, wT, wU] = fg ? [b1.text, b1.url, b2.text, b2.url] : [b2.text, b2.url, b1.text, b1.url];
          out.push(getDual(v)(gT, gU, wT, wU)); i = b2.nextI; continue;
        }
        out.push(getBtn(b1.color, v)(b1.text, b1.url)); i = b1.nextI; continue;
      }
      out.push(lines[i]); i++;
    }
    t = out.join('\n').replace(/(\n?<br><br>\n?){2,}/g, '\n<br><br>\n');
    return t.trim();
  }

  // ── Normalize docx HTML → plain text ─────────────────────────────────────
  function normalizeDocx(html) {
    let t = html;
    t = t.replace(/&amp;/g, '&');
    t = t.replace(/<a[^>]*href="([^"]*)"[^>]*>([\s\S]*?)<\/a>/gi, (_, href, inner) => {
      href = href.replace(/&amp;/g, '&');
      const text = inner.replace(/<[^>]+>/g, '').trim();
      return (!text || text === href) ? href : `${text} ${href}`;
    });
    t = t.replace(/<br\s*\/?>/gi, '\n');
    t = t.replace(/<strong>/g, '<b>').replace(/<\/strong>/g, '</b>');
    t = t.replace(/<em>/g, '<i>').replace(/<\/em>/g, '</i>');
    t = t.replace(/<h[1-6][^>]*>/g, '<b>').replace(/<\/h[1-6]>/g, '</b>\n');
    t = t.replace(/<\/p>/g, '\n').replace(/<p[^>]*>/g, '');
    t = t.replace(/<(?!\/?(?:b|i)\b)[^>]+>/g, '');
    t = t.replace(/(https?:\/\/[^\n\s]+)\n([^<\n\s])/g, '$1$2');
    return t;
  }

  // ── Non-breaking spaces (Russian) ─────────────────────────────────────────
  function applyNbsp(text, lang) {
    if (/RUS|RU\b/i.test(lang)) {
      text = text.replace(/ (000)/g, '&nbsp;$1');
      text = text.replace(/ (₽)/g, '&nbsp;$1');
    }
    return text;
  }

  // ── Parse document into sections ──────────────────────────────────────────
  function parseDoc(text) {
    const sections = [], topics = {}, lines = text.split('\n');
    let lang = '', key = '', body = [], awaitT = false, awaitFor = '';
    const save = () => { if (key) sections.push({ lang, key, topic: topics[key] || '', body: body.join('\n') }); };
    for (const raw of lines) {
      const plain = raw.replace(/<[^>]+>/g, '').trim();
      if (/^[A-Z]{2,6}(\s+[A-Z]{2,6})+$/.test(plain)) { save(); lang = plain; key = ''; body = []; awaitT = false; continue; }
      if (/^[a-z][a-zA-Z0-9_]*(\.[a-zA-Z0-9_]+)+$/.test(plain) && !plain.includes(' ')) {
        if (plain.endsWith('.topic')) { awaitFor = plain.replace(/\.topic$/, ''); awaitT = true; continue; }
        save(); key = plain; body = []; awaitT = false; continue;
      }
      if (awaitT && plain && !/неразрывные\s+пробелы/i.test(plain)) { topics[awaitFor] = plain; awaitT = false; continue; }
      if (/неразрывные\s+пробелы/i.test(plain)) continue;
      if (key) body.push(raw);
    }
    save();
    if (!sections.length && text.trim()) sections.push({ lang: '', key: 'output', topic: '', body: text });
    return sections;
  }

  // ── UI ────────────────────────────────────────────────────────────────────
  function buildTabs() {
    const c = document.getElementById('key-tabs');
    if (!parsedSections.length) { c.innerHTML = '<span class="key-tabs-placeholder">← конвертируйте текст</span>'; return; }
    c.innerHTML = parsedSections.map((s, i) => {
      const ks = s.key.replace(/^.*\.(\d+)$/, '$1');
      const ls = s.lang ? ' [' + s.lang.split(' ').pop() + ']' : '';
      return `<button class="ktab${i === 0 ? ' active' : ''}" onclick="selKey(${i})">${ks !== s.key ? ks : s.key}${ls}</button>`;
    }).join('');
  }

  function selKey(i) { curKey = i; document.querySelectorAll('.ktab').forEach((b, j) => b.classList.toggle('active', j === i)); render(); }
  function showVersion(i) { curVer = i; document.querySelectorAll('.vtab').forEach((b, j) => b.classList.toggle('active', j === i)); render(); }

  function render() {
    if (!parsedSections.length) return;
    const s = parsedSections[curKey], el = document.getElementById('output');
    const result = curVer === 3 ? (s.topic || '') : applyRules(applyNbsp(s.body, s.lang), curVer);
    el.textContent = result;
    el.classList.toggle('empty', !result.trim());
  }

  function convert() {
    const raw = document.getElementById('input').value;
    if (!raw.trim()) return;
    const norm = fromDocx ? normalizeDocx(raw) : raw.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    parsedSections = parseDoc(norm); curKey = 0; curVer = 0;
    document.querySelectorAll('.vtab').forEach((b, i) => b.classList.toggle('active', i === 0));
    buildTabs(); render();
  }

  function clearAll() {
    fromDocx = false; parsedSections = []; curKey = 0; curVer = 0;
    document.getElementById('input').value = '';
    document.getElementById('docx-banner').classList.remove('visible');
    document.getElementById('source-badge').className = 'source-badge text';
    document.getElementById('source-badge').textContent = 'текст';
    document.getElementById('key-tabs').innerHTML = '<span class="key-tabs-placeholder">← конвертируйте текст</span>';
    const el = document.getElementById('output');
    el.textContent = '← Вставьте текст или загрузите .docx';
    el.classList.add('empty');
  }

  // ── .docx ──────────────────────────────────────────────────────────────────
  async function loadDocx(file) {
    if (!file || !file.name.endsWith('.docx')) return;
    try {
      const r = await mammoth.convertToHtml({ arrayBuffer: await file.arrayBuffer() });
      fromDocx = true;
      document.getElementById('input').value = r.value;
      document.getElementById('docx-filename').textContent = '📄 ' + file.name;
      document.getElementById('docx-banner').classList.add('visible');
      document.getElementById('source-badge').className = 'source-badge docx';
      document.getElementById('source-badge').textContent = '.docx';
      convert();
    } catch (e) { alert('Ошибка: ' + e.message); }
  }

  function handleFileInput(e) { const f = e.target.files[0]; if (f) loadDocx(f); e.target.value = ''; }

  const dz = document.getElementById('drop-zone');
  document.addEventListener('dragover', e => { if ([...e.dataTransfer.items].some(i => i.kind === 'file')) { e.preventDefault(); dz.classList.add('dragging'); } });
  document.addEventListener('dragleave', e => { if (!e.relatedTarget || e.relatedTarget === document.body) dz.classList.remove('dragging'); });
  document.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragging'); const f = e.dataTransfer.files[0]; if (f) loadDocx(f); });

  // ── Copy ──────────────────────────────────────────────────────────────────
  async function copyOutput() {
    const el = document.getElementById('output');
    if (el.classList.contains('empty')) return;
    try { await navigator.clipboard.writeText(el.textContent); }
    catch { const ta = document.createElement('textarea'); ta.value = el.textContent; ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); }
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Скопировано!'; btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Копировать HTML'; btn.classList.remove('ok'); }, 2000);
  }

  document.getElementById('input').addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') convert(); });
  window.addEventListener('load', () => { if (typeof mammoth === 'undefined') document.getElementById('docx-support').style.display = 'none'; });
</script>
</body>
</html>
